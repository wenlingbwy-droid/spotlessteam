<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GAS 工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script> <style>
        /* 解決手機版限高的關鍵：讓 iframe 填滿剩餘高度 */
        .iframe-container {
            height: calc(100vh - 64px); /* 扣除導覽列高度 */
            width: 100%;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">

    <nav class="bg-blue-600 text-white p-4 shadow-md flex justify-between">
        <h1 class="font-bold">一塵不染 網站</h1>
        <select id="toolSelector" class="text-black rounded px-2 text-sm" onchange="switchTool(this.value)">
            <option value="https://script.google.com/macros/s/AKfycbyxdqOfu2xwZJImlI0QeMHVZqJzQBho8b1pbTbQz8IPgMqIwIQS9wNMJwWlOPnli4D6/exec?page=sunrise">旭日組</option>
            <option value="https://script.google.com/macros/s/AKfycbyxdqOfu2xwZJImlI0QeMHVZqJzQBho8b1pbTbQz8IPgMqIwIQS9wNMJwWlOPnli4D6/exec?page=morning">晨光組</option>
        </select>
    </nav>

    <div class="flex-grow">
        <iframe id="mainFrame" 
                src="https://script.google.com/macros/s/AKfycbyxdqOfu2xwZJImlI0QeMHVZqJzQBho8b1pbTbQz8IPgMqIwIQS9wNMJwWlOPnli4D6/exec?page=sunrise" 
                class="iframe-container border-none"
                allow="geolocation; microphone; camera">
        </iframe>
    </div>

    <script>
        function switchTool(url) {
            document.getElementById('mainFrame').src = url;
        }
    </script>
</body>
</html>
